name: pr-approval-gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  approval:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Require Emm5317 approval
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('No pull request payload found.');
              return;
            }

            if (pr.user && pr.user.login === 'Emm5317') {
              core.info('PR author is Emm5317; gate passed.');
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) latestByUser.set(review.user.login, review.state);

            if (latestByUser.get('Emm5317') !== 'APPROVED') {
              core.setFailed('Contributor PRs require an APPROVED review from Emm5317.');
              return;
            }

            core.info('Emm5317 approval found.');
